<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sound Autoplay Test</title>
<style>
    body {
        background: #0a0a14;
        color: #e0e0e0;
        font-family: sans-serif;
        text-align: center;
        padding: 40px;
    }
    h1 { color: #ffd84a; }
    #status { margin-top: 20px; font-size: 18px; }
    button {
        background: #2a4080;
        color: #fff;
        border: 1px solid #4a6ab0;
        padding: 10px 20px;
        font-size: 16px;
        cursor: pointer;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <h1>Sound Autoplay Test</h1>
    <p>If the embedded browser allows autoplay, you should hear a beep.</p>

    <audio id="snd" autoplay>
        <source src="beep.mp3" type="audio/mpeg">
        <source src="beep.wav" type="audio/wav">
    </audio>

    <div id="status">Initializing...</div>
    <button onclick="playSound()">Play Manually</button>

    <script>
        const snd = document.getElementById('snd');
        const status = document.getElementById('status');

        function playSound() {
            snd.currentTime = 0;
            snd.play()
                .then(() => { status.textContent = 'Playing (manual)'; })
                .catch(e => { status.textContent = 'Manual play blocked: ' + e.message; });
        }

        // Try autoplay
        snd.play()
            .then(() => { status.textContent = 'Autoplay SUCCESS'; })
            .catch(e => { status.textContent = 'Autoplay BLOCKED: ' + e.message; });

        // Loop every 3s
        setInterval(() => {
            snd.currentTime = 0;
            snd.play().catch(() => {});
        }, 3000);
    </script>
</body>
</html>
